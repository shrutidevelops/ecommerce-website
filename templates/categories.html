<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORIES</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2 class="page-title">Product Categories</h2>

<div class="category-container">
    {% for col in data %}
    <div class="category-card">

        <a href="/categoryproducts/{{ col[0] }}">
            <img src="{{ url_for('static', filename='images/' + col[2]) }}"
                 class="category-img">
        </a>

        <a href="/categoryproducts/{{ col[0] }}"
           class="category-link">
            {{ col[1] }}
        </a>

        {% if session.get('role') == 'admin' %}
          <div class="category-actions">
          <a href="/updatecategory/{{ col[0] }}"
          class="update-btn">
         Update ✏️
        </a>

        <a href="/deletecategory/{{ col[0] }}"
          class="delete-btn"
          onclick="return confirm('Are you sure you want to delete this category?');">
          Delete 🗑️
        </a>
   </div>
   {% endif %}

    </div>
    {% endfor %}
</div>

<footer>
    <p>© 2026 ShruShop. All Rights Reserved.</p>
</footer>

</body>
</html>
