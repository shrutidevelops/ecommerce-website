<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2 class="page-title">Shopping Cart</h2>

    <div class="product-container">
        {% for col in data %}
        <div class="product-card">

            <img src="{{ url_for('static', filename=col[5]) }}"
                 alt="Product Image"
                 class="product-img">

            <h3>{{ col[1] }}</h3>

            <p class="product-price">
                ₹{{ col[2] }}
            </p>

            <p class="product-stock">
                Quantity: {{ col[3] }}
            </p>

            <p class="product-stock">
                Subtotal: ₹{{ col[4] }}
            </p>

            <div class="product-actions">
                <a href="/updatecart/{{ col[0] }}"
                   class="cart-btn">
                   Update ✏️
                </a>

                <a href="/deletecart/{{ col[0] }}"
                   class="delete-btn"
                   onclick="return confirm('Remove this item from cart?');">
                   Remove 🗑️
                </a>
            </div>

        </div>
        {% endfor %}
    </div>

    <div class="cart-summary">

    <h3 class="cart-total">
        Total Amount = ₹{{ total }}
    </h3>

    <div class="hero-actions">
        <a href="/checkout" class="btn">
         Proceed to Checkout
        </a>

        <a href="/orders" class="btn">
            View Orders
        </a>
    </div>
    </div>

    <footer>
        <p>© 2026 ShruShop. All Rights Reserved.</p>
    </footer>

</body>
</html>
